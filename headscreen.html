<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Operations Dashboard</title>
    <script src="js/libs/vue.global.prod.js"></script>
    <script src="js/libs/echarts.min.js"></script>
    <script src="js/libs/echarts-gl.min.js"></script>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div id="app">
        <div class="screen-shell">
            <header class="topbar-scifi">
                <div class="topbar-center" style="pointer-events: auto;">
                    <div class="center-bg"></div>
                    <h1>总部运维指挥中心</h1>
                    <p>{{ currentTime }}</p>

                    <select v-model="selectedRange" class="time-select">
                        <option value="today">今日</option>
                        <option value="week">本周</option>
                        <option value="month">本月</option>
                    </select>
                </div>
            </header>

            <section class="view layout-3d">
                <div class="left-col" style="display: flex; flex-direction: column; gap: 20px;">
                    <section class="panel">
                        <div class="panel-header" style="margin-bottom: 10px;">
                            <div>
                                <h3>运维概况</h3>
                            </div>
                        </div>
                        <div class="mini-grid" style="grid-template-columns: repeat(4, 1fr); gap: 14px;">
                            <div class="mini-stat">
                                <div class="small-note">一级运维</div>
                                <div class="number" style="color: #00ff88;">8</div>
                            </div>
                            <div class="mini-stat">
                                <div class="small-note">二级运维</div>
                                <div class="number" style="color: #00f3ff;">20</div>
                            </div>
                            <div class="mini-stat">
                                <div class="small-note">医院数量</div>
                                <div class="number" style="color: #ffb800;">{{ hospitals.length }}</div>
                            </div>
                            <div class="mini-stat">
                                <div class="small-note">运维对象</div>
                                <div class="number" style="color: #ffca63;">426</div>
                            </div>
                        </div>
                    </section>

                    <section class="panel flex-1">
                        <div class="panel-header">
                            <div>
                                <h3>告警闭环状态</h3>
                            </div>
                        </div>
                        <div id="hq-closure-chart" class="chart"></div>
                    </section>

                    <section class="panel flex-1">
                        <div class="panel-header">
                            <div>
                                <h3>告警处理效率</h3>
                            </div>
                        </div>
                        <div id="hq-compare-chart" class="chart"></div>
                    </section>
                </div>

                <div class="center-col">
                    <div class="three-container">
                        <div id="china-map-chart" class="chart"></div>
                    </div>

                    <!-- HUD Stats overlaid bottom center -->
                    <div class="hud-stats">
                        <article v-for="card in hqCards" :key="card.label" class="metric-card"
                            :class="card.tone ? 'tone-' + card.tone : ''" @click="openMetricModal(card)"
                            style="cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;"
                            onmouseover="this.style.boxShadow='0 0 15px rgba(0, 243, 255, 0.4)'; this.style.transform='translateY(-2px)';"
                            onmouseout="this.style.boxShadow='none'; this.style.transform='translateY(0)';">
                            <div class="label">{{ card.label }}</div>
                            <div class="value">{{ card.value }}</div>
                            <div class="bottom-row">
                                <div class="trend-badge-container"
                                    style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                                    <div class="trend-badge" :class="{ 'bad': !card.momGood }">
                                        <span>环比</span><span style="font-weight: bold; margin-left: 4px;">{{ card.momDir
                                            === 'up' ? '↑' : '↓' }} {{ card.momText }}</span>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>
                </div>

                <div class="right-col" style="display: flex; flex-direction: column; gap: 20px;">
                    <section class="panel flex-1">
                        <div class="panel-header">
                            <div>
                                <h3>告警主题TOP10</h3>
                            </div>
                        </div>
                        <div id="left-chart-2" class="chart"></div>
                    </section>
                    <section class="panel flex-1">
                        <div class="panel-header">
                            <div>
                                <h3>告警资源类型</h3>
                            </div>
                        </div>
                        <div id="left-chart-1" class="chart"></div>
                    </section>
                </div>
            </section>

            <!-- Metric Trend Modal -->
            <div class="modal-overlay" :style="{ display: metricModalVisible ? 'flex' : 'none' }"
                @click.self="closeMetricModal"
                style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(3px);">
                <div class="modal-content"
                    style="background: rgba(10, 24, 43, 0.95); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 12px; width: 760px; padding: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.8);">
                    <div class="modal-header"
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid rgba(0, 243, 255, 0.2); padding-bottom: 15px;">
                        <h3
                            style="margin: 0; color: #00f3ff; font-size: 18px; letter-spacing: 1px; font-weight: normal;">
                            {{ activeMetricTitle }}</h3>
                        <span @click="closeMetricModal"
                            style="color: #86a6bc; cursor: pointer; font-size: 26px; line-height: 20px; transition: color 0.3s;"
                            onmouseover="this.style.color='#00f3ff'"
                            onmouseout="this.style.color='#86a6bc'">&times;</span>
                    </div>
                    <div id="metric-trend-chart" style="width: 100%; height: 380px;"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/data/mock-data.js"></script>
    <script src="js/data/data-service.js"></script>
    <script src="js/headscreen.js"></script>
</body>

</html>
